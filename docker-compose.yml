services:
  postgres:
    image: postgres:16-alpine
    container_name: mundo_invest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-mundoinvest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mundoinvest}
      POSTGRES_DB: ${DB_NAME:-mundoinvest}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mundoinvest}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
