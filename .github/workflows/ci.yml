name: CI — Test & Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancela runs anteriores do mesmo PR para economizar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22.2"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true # cacheia $GOPATH/pkg/mod entre runs

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: GOTOOLCHAIN=local go test ./tests/... -v -race -coverprofile=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Coverage summary
        run: GOTOOLCHAIN=local go tool cover -func=coverage.out | tail -1

  # ─────────────────────────────────────────────
  # Job 2: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  # ─────────────────────────────────────────────
  # Job 3: Build (valida que compila)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: GOTOOLCHAIN=local go build -o /dev/null ./cmd/api

      - name: Build Docker image (sem push — valida Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mundo-invest-api:ci

  # ─────────────────────────────────────────────
  # Job 4: Terraform Validate (sem AWS credentials)
  # ─────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8"

      - name: terraform fmt check
        run: terraform fmt -check -recursive

      - name: terraform init (local backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate
